{% extends "base.html" %}
{% block title %}Sign up — Subplot{% endblock %}

{% block content %}
<section class="auth-section">
  <div class="auth-card">
    <div class="auth-header">
      <div class="auth-logo">◎</div>
      <h1 class="auth-title">Create your account</h1>
      <p class="auth-sub">Grade peace of mind starts here.</p>
    </div>

    <form class="auth-form" id="signup-form" novalidate>
      <div class="form-group">
        <label class="form-label" for="email">Email address</label>
        <input
          class="form-input"
          type="email"
          id="email"
          name="email"
          placeholder="you@example.com"
          autocomplete="email"
          required
        />
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input
          class="form-input"
          type="password"
          id="password"
          name="password"
          placeholder="At least 8 characters"
          autocomplete="new-password"
          minlength="8"
          required
        />
      </div>

      <div class="form-group">
        <label class="form-label" for="timezone">Your timezone</label>
        <select class="form-input form-select" id="timezone" name="timezone">
          <option value="America/Los_Angeles">Pacific Time (PT)</option>
          <option value="America/Denver">Mountain Time (MT)</option>
          <option value="America/Chicago">Central Time (CT)</option>
          <option value="America/New_York">Eastern Time (ET)</option>
          <option value="America/Phoenix">Arizona (MST, no DST)</option>
          <option value="Pacific/Honolulu">Hawaii (HST)</option>
        </select>
      </div>

      <div id="auth-error" class="form-error" hidden></div>

      <button type="submit" class="btn btn-primary btn-full" id="signup-btn">
        Create account
      </button>
    </form>

    <p class="auth-footer">
      Already have an account? <a href="/login" class="link">Sign in</a>
    </p>
  </div>
</section>
{% endblock %}

{% block scripts %}
<script>
document.getElementById('signup-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('signup-btn');
  const err = document.getElementById('auth-error');
  err.hidden = true;
  btn.disabled = true;
  btn.textContent = 'Creating account…';

  const data = {
    email: document.getElementById('email').value.trim(),
    password: document.getElementById('password').value,
    timezone: document.getElementById('timezone').value,
  };

  try {
    const res = await fetch('/api/auth/signup', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data),
    });
    if (res.ok) {
      window.location.href = '/dashboard';
    } else {
      const body = await res.json();
      err.textContent = body.detail || 'Signup failed. Please try again.';
      err.hidden = false;
      btn.disabled = false;
      btn.textContent = 'Create account';
    }
  } catch {
    err.textContent = 'Network error. Please try again.';
    err.hidden = false;
    btn.disabled = false;
    btn.textContent = 'Create account';
  }
});
</script>
{% endblock %}
